name: Rust

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04-16core
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: divine_bridge
          POSTGRES_USER: divine
          POSTGRES_PASSWORD: divine_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U divine -d divine_bridge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgres://divine:divine_dev@127.0.0.1:5432/divine_bridge
      DATABASE_URL: postgres://divine:divine_dev@127.0.0.1:5432/divine_bridge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install PostgreSQL client libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev pkg-config

      - name: Verify workspace
        run: bash scripts/test-workspace.sh

      - name: Verify coverage thresholds
        env:
          COVERAGE_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          bash scripts/check-coverage-thresholds.sh --self-test
          mkdir -p target/llvm-cov
          git fetch --no-tags --depth=1 origin "$COVERAGE_BASE"
          base_parent="$(mktemp -d)"
          base_worktree="$base_parent/worktree"
          git worktree add --detach "$base_worktree" "$COVERAGE_BASE"
          trap 'git worktree remove --force "$base_worktree" 2>/dev/null || true' EXIT
          (
            cd "$base_worktree"
            CARGO_TARGET_DIR="$GITHUB_WORKSPACE/target/llvm-cov-base-target" \
              cargo llvm-cov --workspace --all-features --json --summary-only \
                --output-path "$GITHUB_WORKSPACE/target/llvm-cov/base-summary.json"
          )
          git worktree remove --force "$base_worktree"
          trap - EXIT
          cargo llvm-cov --workspace --all-features --lcov --output-path target/llvm-cov/lcov.info
          cargo llvm-cov report --json --summary-only --output-path target/llvm-cov/summary.json
          COVERAGE_BASE_SUMMARY_PATH=target/llvm-cov/base-summary.json \
            bash scripts/check-coverage-thresholds.sh \
            --lcov target/llvm-cov/lcov.info \
            --summary-json target/llvm-cov/summary.json \
            --base "$COVERAGE_BASE"
