name: Bug Report
description: Report a bug or regression
title: "fix: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Use generic descriptors instead of partner, customer, or brand names in public issue titles, bodies, and screenshots unless a maintainer explicitly approves naming them.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug and its impact on runtime, provisioning, moderation, or feed behavior.
    validations:
      required: true
