services:
  coredns:
    image: coredns/coredns:1.12.1
    restart: unless-stopped
    command: -conf /etc/coredns/Corefile
    volumes:
      - ./Corefile.example:/etc/coredns/Corefile:ro

  tailscale:
    image: tailscale/tailscale:stable
    restart: unless-stopped
    hostname: ${TS_HOSTNAME:-dns-localnet}
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:-tskey-localnet-placeholder}
      TS_STATE_DIR: /var/lib/tailscale
      TS_EXTRA_ARGS: ${TS_EXTRA_ARGS:---advertise-tags=tag:dev}
      TS_SERVE_CONFIG: /config/serve.json
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ./tailscale:/config
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun

  app:
    image: alpine:3.20
    restart: unless-stopped
    command: ["sh", "-lc", "echo placeholder localnet admin service && sleep infinity"]
    depends_on:
      tailscale:
        condition: service_started
    network_mode: service:tailscale

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
      tailscale:
        condition: service_started
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - dns-certs:/etc/nginx/certs
    network_mode: service:tailscale

volumes:
  tailscale-state:
  dns-certs:
