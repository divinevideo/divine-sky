services:
  coredns:
    image: coredns/coredns:1.12.1
    restart: unless-stopped
    command: -conf /etc/coredns/Corefile
    volumes:
      - ./Corefile.example:/etc/coredns/Corefile:ro
      - zone-data:/zones

  tailscale:
    image: tailscale/tailscale:stable
    restart: unless-stopped
    hostname: ${TS_HOSTNAME:-dns-localnet}
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:-tskey-localnet-placeholder}
      TS_STATE_DIR: /var/lib/tailscale
      TS_EXTRA_ARGS: ${TS_EXTRA_ARGS:---advertise-tags=tag:dev}
      TS_SERVE_CONFIG: /config/serve.json
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ./tailscale:/config
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun

  app:
    image: rust:1.86-bookworm
    restart: unless-stopped
    working_dir: /workspace
    command: ["bash", "-lc", "cargo run -p divine-localnet-admin"]
    environment:
      LOCALNET_ADMIN_BIND_ADDR: 0.0.0.0:3000
      LOCALNET_ADMIN_DATA_DIR: /data
      LOCALNET_ADMIN_ZONE_DIR: /zones
      LOCALNET_ADMIN_DOMAIN: divine.test
      LOCALNET_ADMIN_WILDCARD_IP: ${LOCALNET_ADMIN_WILDCARD_IP:-100.64.0.10}
    depends_on:
      coredns:
        condition: service_started
      tailscale:
        condition: service_started
    volumes:
      - ../../..:/workspace
      - admin-data:/data
      - zone-data:/zones
    network_mode: service:tailscale

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
      tailscale:
        condition: service_started
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - dns-certs:/etc/nginx/certs
    network_mode: service:tailscale

volumes:
  admin-data:
  zone-data:
  tailscale-state:
  dns-certs:
