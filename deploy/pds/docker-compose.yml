# Docker Compose for local rsky-pds development
# Usage: cp env.example .env && docker compose up -d

version: "3.9"

services:
  pds:
    image: ghcr.io/blacksky-algorithms/rsky-pds:latest
    ports:
      - "2583:2583"
    environment:
      - PDS_HOSTNAME=${PDS_HOSTNAME}
      - PDS_SERVICE_DID=${PDS_SERVICE_DID}
      - PDS_SERVICE_HANDLE_DOMAINS=${PDS_SERVICE_HANDLE_DOMAINS}
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - AWS_ENDPOINT=http://minio:9000
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - PDS_DID_PLC_URL=${PDS_DID_PLC_URL}
      - PDS_BSKY_APP_VIEW_URL=${PDS_BSKY_APP_VIEW_URL}
      - PDS_BSKY_APP_VIEW_DID=${PDS_BSKY_APP_VIEW_DID}
      - PDS_ADMIN_PASSWORD=${PDS_ADMIN_PASSWORD}
      - RUST_LOG=${RUST_LOG:-info}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2583/xrpc/_health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - pds-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-pds}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-pds_dev_password}
      - POSTGRES_DB=${POSTGRES_DB:-pds}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pds}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - pds-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${AWS_ACCESS_KEY_ID:-minioadmin}
      - MINIO_ROOT_PASSWORD=${AWS_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - pds-network
    restart: unless-stopped

  # Creates the default bucket on first run
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${AWS_ACCESS_KEY_ID:-minioadmin} $${AWS_SECRET_ACCESS_KEY:-minioadmin};
      mc mb --ignore-existing local/pds-blobs;
      exit 0;
      "
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-minioadmin}
    networks:
      - pds-network

volumes:
  postgres-data:
  minio-data:

networks:
  pds-network:
    driver: bridge
