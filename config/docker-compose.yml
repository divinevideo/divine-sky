# Shared local services for workspace bootstrap and manual development.
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: divine_bridge
      POSTGRES_USER: divine
      POSTGRES_PASSWORD: divine_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U divine -d divine_bridge"]
      interval: 10s
      timeout: 5s
      retries: 5
  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: divine
      MINIO_ROOT_PASSWORD: divine_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  pgdata:
