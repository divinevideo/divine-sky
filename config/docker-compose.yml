services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: divine_bridge
      POSTGRES_USER: divine
      POSTGRES_PASSWORD: divine_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: divine
      MINIO_ROOT_PASSWORD: divine_dev
    ports:
      - "9000:9000"
      - "9001:9001"
volumes:
  pgdata:
